kind = "web"
previewPath = "/"
title = "H Fans"
version = "1.0.0"
id = "artifacts/hfans"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22682

[services.development]
run = "pnpm --filter @workspace/hfans run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hfans", "run", "build" ]
publicDir = "artifacts/hfans/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22682"
BASE_PATH = "/"
